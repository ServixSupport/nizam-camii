/* =================================================================
   NIZAM-I ALEM SÜLEYMANIYE CAMII — NAMAZ VAKITLERI EKRANI
   Tek dosya. GitHub + Vercel'e yüklemek için bu dosyayı index.html
   olarak koyman yeterli. Tüm ayarlar aşağıdaki CONFIG bölümünde.
   ================================================================= */

:root{
  /* renkler */
  --bg-1:#07173a;
  --bg-2:#0a2150;
  --bg-3:#050f2b;
  --panel:rgba(255,255,255,0.045);
  --panel-brd:rgba(120,160,225,0.20);
  --label:#9fb1d0;        /* namaz isimleri (gri-mavi) */
  --label-ar:#7286ab;     /* arapça latin (daha soluk) */
  --white:#ffffff;        /* saatler beyaz */
  --cyan:#5cc8ff;         /* vakte kalan / açık mavi */
  --flash:#ffd23f;        /* vakit girince sarı */
  --gold:#ffc23d;         /* güneş ikonları */
  --gold-2:#ff9d2e;
  --time-size:138px;      /* namaz saatleri + sayaç ortak boyut */
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#050f2b;overflow:hidden}
body{
  font-family:'Inter',system-ui,Arial,sans-serif;
  color:var(--white);
  background:
    radial-gradient(120% 80% at 50% 0%, #0c2a63 0%, var(--bg-2) 38%, var(--bg-1) 70%, var(--bg-3) 100%);
  -webkit-font-smoothing:antialiased;
}

/* ---- 1920x1080 sahne; JS ile ekrana göre ölçeklenir (65" ve 32" TV) ---- */
#stage{
  position:absolute;left:50%;top:50%;
  width:1920px;height:1080px;
  transform-origin:50% 50%;
  transform:translate(-50%,-50%) scale(1);
  padding:38px 54px 38px;
  display:flex;flex-direction:column;overflow:hidden;
}

.num{font-family:'Oswald','Arial Narrow',system-ui,sans-serif;font-variant-numeric:tabular-nums;letter-spacing:.5px}

/* ===================== ÜST BAŞLIK ===================== */
header{position:relative;height:118px;flex:0 0 auto}
.dates{position:absolute;left:4px;top:50%;transform:translateY(-50%);line-height:1.4;max-width:460px;white-space:nowrap}
.dates .d{font-size:30px;font-weight:600;color:#cfdaf0}
.dates .h{font-size:26px;font-weight:500;color:var(--label)}

.brand{height:100%;display:flex;align-items:center;justify-content:center;gap:24px}
.brand img{height:98px;width:98px;object-fit:contain;
  filter:drop-shadow(0 4px 14px rgba(0,0,0,.45))}
.brand .name{
  font-family:'Oswald',sans-serif;font-weight:600;
  font-size:58px;letter-spacing:1.2px;color:#fff;text-align:center;
  text-shadow:0 3px 16px rgba(0,0,0,.4);white-space:nowrap;
}
.brand .name b{color:#ffd98a;font-weight:600}
.rule{height:3px;width:500px;margin:8px auto 0;
  background:linear-gradient(90deg,transparent, #ffd98a55 30%, #ffd98a 50%, #ffd98a55 70%, transparent)}

/* ===================== ORTA: SAAT + GÜNEŞLER ===================== */
.midrow{flex:0 0 auto;height:262px;display:flex;align-items:center;justify-content:space-between;margin-top:2px}

.sun-panel{width:500px;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:18px;
  border-radius:20px;padding:8px 16px}
.sun-ico{width:96px;height:96px;flex:0 0 auto;color:var(--gold);
  filter:drop-shadow(0 0 22px rgba(255,180,60,.45))}
.sun-ico svg{width:100%;height:100%;display:block}
.sun-text{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;line-height:1.1}
.sun-tr{font-size:42px;font-weight:700;color:var(--label);letter-spacing:1px;white-space:nowrap}
.sun-ar{font-size:24px;font-weight:700;color:var(--label-ar);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;white-space:nowrap}
.sun-panel .time{font-size:66px;font-weight:600;color:var(--white);margin-left:4px}

.clockwrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.clockwrap::before{content:"";position:absolute;width:760px;height:340px;
  background:radial-gradient(closest-side, rgba(92,200,255,.16), transparent 72%);filter:blur(6px)}
.clock{position:relative;font-size:208px;font-weight:600;line-height:.92;color:#fff;
  text-shadow:0 6px 40px rgba(70,150,255,.30)}
.clock .sep{animation:sepPulse 2s ease-in-out infinite}
@keyframes sepPulse{0%,100%{opacity:1}50%{opacity:.55}}

/* ===================== ALT: 6 KUTU ===================== */
.grid{flex:1 1 auto;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);
  gap:22px;margin-top:10px;min-height:0}

.box{
  background:var(--panel);
  border:2px solid var(--panel-brd);
  border-radius:22px;
  padding:16px 28px 16px;
  display:flex;flex-direction:column;justify-content:flex-start;
  position:relative;overflow:hidden;
}
.box .head{display:flex;align-items:baseline;justify-content:space-between}
.box .tr{font-size:54px;font-weight:600;color:var(--label);letter-spacing:.5px}
.box .ar{font-size:40px;font-weight:700;color:var(--label-ar);letter-spacing:1.5px;text-transform:uppercase}
.box .time{font-size:var(--time-size);font-weight:600;color:var(--white);text-align:center;line-height:1;margin:auto 0}

/* sıradaki vakit — ince açık-mavi vurgu (kutu + güneş panelleri) */
.box.next{border-color:rgba(92,200,255,.85);box-shadow:0 0 0 3px rgba(92,200,255,.5) inset,0 0 42px rgba(92,200,255,.24)}
.box.next .tr{color:#c7e6ff}
.sun-panel.next{background:rgba(92,200,255,0.09);
  box-shadow:0 0 0 2px rgba(92,200,255,.65),0 0 28px rgba(92,200,255,.2)}
.sun-panel.next .sun-tr{color:#c7e6ff}

/* vakit girince: sarı + 1 dk yanıp sönme */
.flash .time{color:var(--flash)!important;animation:blink 1s steps(1,end) infinite}
.flash.box{border-color:rgba(255,210,63,.6);box-shadow:0 0 38px rgba(255,200,50,.28)}
/* Sabah & Güneş: ikon+yazı+saat birlikte animasyonlu (gidip gelir), saat sarı yanıp söner */
.sun-panel.flash{animation:sunPulse 1.5s ease-in-out infinite}
.sun-panel.flash .sun-ico{filter:drop-shadow(0 0 30px rgba(255,200,60,.9))}
.sun-panel.flash .time{color:var(--flash)!important;animation:blink 1s steps(1,end) infinite}
@keyframes sunPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.55;transform:scale(1.06)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.18}}

/* ----- VAKTE KALAN (açık mavi) — namaz kutusuyla aynı düzen ----- */
.countdown{background:rgba(92,200,255,0.07);border-color:rgba(92,200,255,0.32)}
.cd-label{font-size:46px;font-weight:600;color:#bfe4ff;letter-spacing:.3px;white-space:nowrap}
.cd-timer{font-size:var(--time-size);font-weight:600;color:var(--cyan);text-align:center;line-height:1;
  letter-spacing:0;margin:auto 0;text-shadow:0 0 26px rgba(92,200,255,.35)}
/* ezan vakti banner */
.countdown.ezan{background:rgba(255,210,63,0.10);border-color:rgba(255,210,63,.6);box-shadow:0 0 40px rgba(255,200,50,.3)}
.countdown.ezan .cd-label{color:#ffe39a}
.cd-banner{font-size:84px;font-weight:700;color:var(--flash);letter-spacing:2px;text-align:center;
  line-height:1;margin:auto 0;
  animation:blink 1s steps(1,end) infinite;text-shadow:0 0 30px rgba(255,200,50,.5)}

.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:40px;color:var(--label);background:rgba(5,15,43,.55);z-index:5}
.hidden{display:none!important}

@media (prefers-reduced-motion: reduce){
  .flash .time,.sun-panel.flash .time,.cd-banner,.clock .sep{animation:none}
  .flash .time,.sun-panel.flash .time,.cd-banner{opacity:1}
}


/* ===================== GÜNDÜZ (beyaz) / GECE (koyu) TEMA ===================== */
#bglight{position:fixed;inset:0;z-index:-1;opacity:0;pointer-events:none;
  background:radial-gradient(120% 80% at 50% 0%, #ffffff 0%, #f7f9fc 42%, #eef2f8 80%, #e7ecf3 100%)}
body.light #bglight{opacity:1}
body.fade #bglight{transition:opacity 10s linear}

/* tema geçişi sırasında renkler 10 sn fade (flash'lar normalde anında) */
body.fade *{transition:color 10s linear, background-color 10s linear, border-color 10s linear,
  box-shadow 10s linear, fill 10s linear, stroke 10s linear, text-shadow 10s linear, filter 10s linear}

/* ---- BEYAZ tema değişkenleri ---- */
body.light{
  --bg-1:#eef2f8; --bg-2:#f7f9fc; --bg-3:#e7ecf3;
  --panel:#ffffff; --panel-brd:#e2e8f1;
  --label:#0e57b0; --label-ar:#5c6b7c; --white:#12233a;
  --cyan:#0c84b4; --flash:#e08a00; --gold:#f59e0b; --gold-2:#ea7a00;
}
body.light .dates .d{color:#2b3a4b}
body.light .dates .h{color:#7a8a99}
body.light .brand .name{color:#152537;text-shadow:0 1px 2px rgba(0,0,0,.06)}
body.light .brand .name b{color:#0e57b0}
body.light .brand img{filter:drop-shadow(0 4px 14px rgba(0,0,0,.18))}
body.light .rule{background:linear-gradient(90deg,transparent,#0e57b033 30%,#0e57b0 50%,#0e57b033 70%,transparent)}
body.light .clock{color:#152537;text-shadow:0 2px 8px rgba(20,40,70,.10)}
body.light .clockwrap::before{background:radial-gradient(closest-side, rgba(12,132,180,.10), transparent 72%)}
body.light .box{border-color:#e2e8f1;box-shadow:0 10px 26px rgba(30,50,80,.07)}
body.light .box.next{border-color:rgba(12,132,180,.9);box-shadow:0 0 0 3px rgba(12,132,180,.5) inset,0 0 42px rgba(12,132,180,.22)}
body.light .box.next .tr{color:#0c84b4}
body.light .sun-panel.next{background:rgba(12,132,180,0.07);box-shadow:0 0 0 2px rgba(12,132,180,.6),0 0 28px rgba(12,132,180,.2)}
body.light .sun-panel.next .sun-tr{color:#0c84b4}
body.light .flash.box{border-color:rgba(224,138,0,.6);box-shadow:0 0 38px rgba(224,138,0,.25)}
body.light .sun-panel.flash .sun-ico{filter:drop-shadow(0 0 30px rgba(245,158,11,.55))}
body.light .countdown{background:rgba(12,132,180,0.06);border-color:rgba(12,132,180,0.30)}
body.light .cd-label{color:#0c84b4}
body.light .cd-timer{text-shadow:0 0 26px rgba(12,132,180,.18)}
body.light .countdown.ezan{background:rgba(224,138,0,0.12);border-color:rgba(224,138,0,.55);box-shadow:0 0 40px rgba(224,138,0,.18)}
body.light .countdown.ezan .cd-label{color:#b45309}
body.light .cd-banner{text-shadow:0 0 30px rgba(224,138,0,.25)}
body.light .loading{background:rgba(255,255,255,.65)}

/* ===================== ALT FOOTER: CAMİ SİLÜETİ ===================== */
.mosque-sil{position:absolute;left:0;right:0;bottom:0;height:150px;z-index:0;pointer-events:none;
  color:var(--silhouette);opacity:var(--sil-op)}
.mosque-sil svg{width:100%;height:100%;display:block}
#stage>header,#stage>.midrow,#stage>.grid{position:relative;z-index:1}
:root{--silhouette:#16335f; --sil-op:.5}
body.light{--silhouette:#b9c6da; --sil-op:.9}
</style>
</head>
<body>

    <div class="box" id="box-Isha">
      <div class="head"><span class="tr">Yatsı</span><span class="ar">Isha</span></div>
      <div class="time num" data-time="Isha">--:--</div>
    </div>
    <div class="box countdown" id="box-countdown">
      <div class="head"><span class="cd-label" id="cd-label">—</span></div>
      <div class="cd-timer num" id="cd-timer">--:--:--</div>
      <div class="cd-banner hidden" id="cd-banner">EZAN VAKTİ</div>
    </div>
  </section>

  <div class="loading" id="loading">Vakitler yükleniyor…</div>
</div>

<script>
/* ===================================================================
   AYARLAR  —  burayı düzenle
   =================================================================== */
const CONFIG = {
  latitude: 52.36523,          // Cami konumu (Ookmeerweg 206, Amsterdam)
  longitude: 4.79997,
  method: 13,                  // 13 = Diyanet İşleri Başkanlığı (Türkiye)
  // Diyanet ile fark olursa dakika cinsinden buradan düzelt (örn İmsak: 2, Isha: -3)
  // Şu an Diyanet'e göre ayarlı: İmsak +48 dk, Yatsı -41 dk
  offsets: { Imsak:48, Fajr:0, Sunrise:0, Dhuhr:0, Asr:0, Maghrib:0, Isha:-41 },
  flashSeconds: 60,            // vakit girince kaç sn sarı yanıp sönsün
};

/* Görüntülenen vakitler (sıra önemli) */
const EVENTS = [
  { key:'Imsak',   tr:'İmsak',  dat:"İmsak'a",  banner:'İMSAK VAKTİ', takeover:true,  el:'box-Imsak' },
  { key:'Fajr',    tr:'Sabah',  dat:"Sabah'a",  banner:'',            takeover:false, el:'sun-Fajr' },
  { key:'Sunrise', tr:'Güneş',  dat:"Güneş'e",  banner:'',            takeover:false, el:'sun-Sunrise' },
  { key:'Dhuhr',   tr:'Öğle',   dat:"Öğle'ye",  banner:'EZAN VAKTİ',  takeover:true,  el:'box-Dhuhr' },
  { key:'Asr',     tr:'İkindi', dat:"İkindi'ye",banner:'EZAN VAKTİ',  takeover:true,  el:'box-Asr' },
  { key:'Maghrib', tr:'Akşam',  dat:"Akşam'a",  banner:'EZAN VAKTİ',  takeover:true,  el:'box-Maghrib' },
  { key:'Isha',    tr:'Yatsı',  dat:"Yatsı'ya", banner:'EZAN VAKTİ',  takeover:true,  el:'box-Isha' },
];

const HICRI_AY = ['','Muharrem','Safer','Rebiülevvel','Rebiülahir','Cemaziyelevvel',
  'Cemaziyelahir','Recep','Şaban','Ramazan','Şevval','Zilkade','Zilhicce'];

/* ---- 1920x1080 sahneyi ekrana sığdır ---- */
function fitStage(){
  const s = Math.min(window.innerWidth/1920, window.innerHeight/1080);
  document.getElementById('stage').style.transform =
    `translate(-50%,-50%) scale(${s})`;
}
window.addEventListener('resize', fitStage);
fitStage();

/* ---- yardımcılar ---- */
const pad = n => String(n).padStart(2,'0');
function parseHM(str){ const m = String(str).match(/(\d{1,2}):(\d{2})/); return m ? [ +m[1], +m[2] ] : null; }
function dateAt(base, hm, offMin){
  const d = new Date(base.getFullYear(), base.getMonth(), base.getDate(), hm[0], hm[1], 0, 0);
  if(offMin) d.setMinutes(d.getMinutes()+offMin);
  return d;
}
function ymd(d){ return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()}`; }

async function fetchDay(d){
  const url = `https://api.aladhan.com/v1/timings/${ymd(d)}`
    + `?latitude=${CONFIG.latitude}&longitude=${CONFIG.longitude}&method=${CONFIG.method}`;
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const j = await r.json();
  return j.data;
}

/* ---- durum ---- */
let DAY = null;            // bugünün tarihi (gün değişimini yakalamak için)
let todayData=null, tomData=null;
let schedule=[];          // {key, tr, banner, el, date} kronolojik (bugün + yarın)
let dataReady=false;

function buildSchedule(){
  const now = new Date();
  const tomBase = new Date(now); tomBase.setDate(tomBase.getDate()+1);

  // Bir vaktin tarihini hesapla. Sabah (Fajr) = Güneş doğuşundan 1 saat önce.
  function eventDate(data, base, ev){
    let hm, extra = 0;
    if(ev.key === 'Fajr'){ hm = parseHM(data.timings['Sunrise']); extra = -60; }
    else { hm = parseHM(data.timings[ev.key]); }
    if(!hm) return null;
    return dateAt(base, hm, (CONFIG.offsets[ev.key]||0) + extra);
  }

  schedule = [];
  for(const ev of EVENTS){
    const d = eventDate(todayData, now, ev);
    if(d) schedule.push({ ...ev, date: d });
  }
  for(const ev of EVENTS){
    const d = eventDate(tomData, tomBase, ev);
    if(d) schedule.push({ ...ev, date: d });
  }
  schedule.sort((a,b)=>a.date-b.date);

  // saat kutucuklarını yaz
  for(const ev of EVENTS){
    const d = eventDate(todayData, now, ev);
    if(!d) continue;
    const txt = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    document.querySelectorAll(`[data-time="${ev.key}"]`).forEach(e=>e.textContent=txt);
  }
  // tarihler
  document.getElementById('date-miladi').textContent =
    new Intl.DateTimeFormat('tr-TR',{day:'numeric',month:'long',year:'numeric',weekday:'long'}).format(now);
  const h = todayData.date.hijri;
  document.getElementById('date-hicri').textContent =
    `${h.day} ${HICRI_AY[+h.month.number]||h.month.en} ${h.year}`;
}

async function loadTimes(){
  try{
    const now = new Date();
    const tom = new Date(now); tom.setDate(tom.getDate()+1);
    [todayData, tomData] = await Promise.all([ fetchDay(now), fetchDay(tom) ]);
    DAY = now.getDate();
    buildSchedule();
    dataReady = true;
    document.getElementById('loading').classList.add('hidden');
  }catch(e){
    console.warn('Vakitler alınamadı, tekrar denenecek:', e);
    if(!dataReady){
      document.getElementById('loading').textContent = 'Bağlantı bekleniyor…';
      setTimeout(loadTimes, 8000);
    }
  }
}

/* ---- her saniye ---- */
function tick(){
  const now = new Date();

  // canlı saat
  document.getElementById('clk-h').textContent = pad(now.getHours());
  document.getElementById('clk-m').textContent = pad(now.getMinutes());

  // gün değişti mi? -> yeniden yükle
  if(dataReady && now.getDate()!==DAY){ dataReady=false; loadTimes(); }
  if(!dataReady) { requestAnimationFrame(()=>setTimeout(tick,250)); return; }

  // aktif (vakit girdi, flashSeconds içinde) olanı bul
  const flashMs = CONFIG.flashSeconds*1000;
  let active=null;
  for(const s of schedule){
    if(now>=s.date && now < s.date.getTime()+flashMs){ active=s; }
  }
  // sıradaki vakit
  let next=null;
  for(const s of schedule){ if(s.date>now){ next=s; break; } }

  // flash sınıflarını güncelle
  document.querySelectorAll('.flash').forEach(el=>el.classList.remove('flash'));
  document.querySelectorAll('.next').forEach(el=>el.classList.remove('next'));
  if(active){ const el=document.getElementById(active.el); if(el) el.classList.add('flash'); }
  // mavi vurgu: animasyon bitince bir sonrakine geçsin (flash sürerken gizli)
  if(!active && next){ const el=document.getElementById(next.el); if(el) el.classList.add('next'); }

  // vakte kalan / ezan vakti
  const cd = document.getElementById('box-countdown');
  const timer = document.getElementById('cd-timer');
  const banner = document.getElementById('cd-banner');
  const label = document.getElementById('cd-label');
  if(active && active.takeover){
    cd.classList.add('ezan');
    timer.classList.add('hidden');
    banner.classList.remove('hidden'); banner.textContent = active.banner;
    label.textContent = active.tr;
  }else{
    // Sabah/Güneş vakti girse bile sayaç normal kalır (ezan vakti yazmaz)
    cd.classList.remove('ezan');
    banner.classList.add('hidden');
    timer.classList.remove('hidden');
    if(next){
      label.textContent = next.dat + ' kalan süre';
      let ms = next.date - now; if(ms<0) ms=0;
      let s=Math.floor(ms/1000);
      const hh=Math.floor(s/3600); s%=3600; const mm=Math.floor(s/60); const ss=s%60;
      timer.textContent = `${pad(hh)}:${pad(mm)}:${pad(ss)}`;
    }else{
      label.textContent=''; timer.textContent='--:--:--';
    }
  }

  if(_forceTheme) applyTheme(_forceTheme==='light'?'light':'dark');
  else applyTheme('dark');   // şimdilik her zaman KOYU tema (beyaz otomatik kapalı)

  requestAnimationFrame(()=>setTimeout(tick,250));
}

/* ---- Gündüz beyaz / gece koyu; Güneş & Akşam'dan 10 sn önce 10 sn'lik fade ---- */
let _theme=null, _themeReady=false;
const _forceTheme=new URLSearchParams(location.search).get('theme'); /* ?theme=light veya ?theme=dark ile elle test; paramsız=otomatik */
function desiredTheme(now){
  const t=now.getTime(); const pts=[];
  for(const s of schedule){
    if(s.key==='Sunrise') pts.push({t:s.date.getTime()-10000, th:'light'});
    if(s.key==='Maghrib') pts.push({t:s.date.getTime()-10000, th:'dark'});
  }
  pts.sort((a,b)=>a.t-b.t);
  let th=null;
  for(const p of pts){ if(p.t<=t) th=p.th; }
  if(th===null && pts.length) th = (pts[0].th==='light') ? 'dark' : 'light';
  return th || 'dark';
}
function applyTheme(th){
  if(th===_theme) return;
  const first=!_themeReady; _theme=th; _themeReady=true;
  if(first){ document.body.classList.toggle('light', th==='light'); return; }
  document.body.classList.add('fade');
  requestAnimationFrame(()=>document.body.classList.toggle('light', th==='light'));
  clearTimeout(window._fadeTimer);
  window._fadeTimer=setTimeout(()=>document.body.classList.remove('fade'), 10600);
}

loadTimes();
tick();
// her saat tazele (saat/yaz kış saati güvenliği)
setInterval(()=>{ if(dataReady) loadTimes(); }, 60*60*1000);
</script>
</body>
</html>
