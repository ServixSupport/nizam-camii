  .header{
    position:relative; z-index:1;
    display:flex; align-items:center; gap:1.4vw;
    padding:3vh 4vw 0;
  }

  .header .name{font-weight:800; font-size:3vh; line-height:1.15;}
  .header .sub{color:var(--text-dim); font-size:2vh; font-weight:600; margin-top:.3vh;}

  .content{
    position:relative; z-index:1;
    flex:1; display:flex; flex-direction:column;
    padding:2vh 7vw 3vh; overflow:hidden;
  }
  .hutbe-title{
    text-align:center; color:var(--green); font-weight:800;
    font-size:4.2vh; line-height:1.2; margin:1vh 0 .6vh;
    text-transform:uppercase; letter-spacing:.5px;
  }
  .hutbe-date{
    text-align:center; color:var(--text-dim); font-size:2.4vh;
    margin-bottom:2.4vh; font-weight:600;
  }
  .hutbe-body{
    flex:1; overflow:hidden;
    font-size:3vh; line-height:1.7; color:var(--text);
    max-width:80vw; margin:0 auto;
  }
  .hutbe-body p{margin-bottom:1.6vh;}
  .hutbe-body .lead{font-weight:700; color:var(--green-light);}
  .hutbe-body .quote{
    font-style:italic; color:var(--text);
    border-left:.5vh solid var(--green-light);
    padding-left:1.5vw; margin:1.6vh 0;
  }
  .footer{
    position:relative; z-index:1;
    text-align:center; color:var(--text-dim); font-size:1.8vh;
    padding:1.5vh 0; border-top:1px solid var(--border);

  .loading{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;

<script>
/* ===== AYARLAR ===== */
// Vercel serverless proxy endpoint (komt later); voor nu test-data ingebed.
const HUTBE_API = "/api/hutbe";

// Voor preview/test: echte data van 19.06.2026
const TEST_DATA = {
  date: "19.06.2026",
  title: "Soera al-Inshirāḥ en de eeuwige blijde boodschap voor de gelovige",
  paragraphs: [
    {type:"lead", text:"Beste Moslims!"},
    {type:"p", text:"In een periode waarin de druk en vervolging van de moslims in Mekka steeds zwaarder werd, openbaarde Allah (swt) Soera al-Inshirāḥ als een bron van troost, hoop en kracht voor Zijn Boodschapper (vzmh) en de gelovigen."},
    {type:"quote", text:"“Hebben Wij jouw borst niet verruimd? Hebben Wij jou niet bevrijd van de last die jouw rug deed bezwijken? Hebben Wij jouw naam niet verheven? Waarlijk, met de moeilijkheid komt gemak. Voorzeker, met de moeilijkheid komt gemak. Wanneer je dan een taak hebt voltooid, zet je dan meteen in voor een andere taak. En richt jouw verlangen uitsluitend op jouw Heer.”"},
    {type:"p", text:"Deze goddelijke boodschap herinnert ons eraan dat geen beproeving eeuwig duurt en dat Allah (swt) Zijn dienaren nooit alleen laat. Daarom bleef deze soera door de eeuwen heen een bron van hoop voor iedereen die worstelt met verdriet, zorgen of moeilijkheden."},
    {type:"lead", text:"Beste Broeders en Zusters!"},
    {type:"p", text:"Daarnaast leert Soera al-Inshirāḥ ons dat een gelovige niet mag vervallen in luiheid of doelloosheid. De gelovige vult zijn leven met goede daden, blijft streven naar de tevredenheid van Allah (swt) en vertrouwt de uitkomst toe aan zijn Heer."},
    {type:"p", text:"Moge Allah (swt) onze harten verruimen, onze lasten verlichten, onze zieken genezen en ons behoren laten tot degenen die geduldig zijn in beproevingen en dankbaar in tijden van gemak."}
  ]
};

function render(data){
  document.getElementById("title").textContent = data.title;
  document.getElementById("date").textContent = data.date;
  const body = document.getElementById("body");
  body.innerHTML = "";
  data.paragraphs.forEach(p=>{
    const el = document.createElement("p");
    if(p.type==="lead") el.className="lead";
    else if(p.type==="quote") el.className="quote";
    el.textContent = p.text;
    body.appendChild(el);
  });
  document.getElementById("loading").style.display="none";
}

async function load(){
  try{
    const res = await fetch(HUTBE_API);
    if(!res.ok) throw new Error("geen api");
    const data = await res.json();
    render(data);
  }catch(e){
    // fallback: test-data tonen
    render(TEST_DATA);
  }
}
load();
</script>
